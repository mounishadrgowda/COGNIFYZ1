<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1 - Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Requirement 3: Simple Navigation Menu -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main class="content-container">
        <!-- Requirement 1: Heading, Paragraph, and Image -->
        <section id="home" class="main-content">
            <h1>Welcome to My First Webpage</h1>
            <p>This is a simple paragraph demonstrating HTML structure and CSS styling. Web development allows you to build amazing things for the internet!</p>
            <!-- Replace the src URL with your own image link or local file path -->
            <img src="https://picsum.photos/600/300" alt="Placeholder web development image" class="responsive-image">
        </section>

        <hr>

        <!-- Requirement 2: Basic Form with Single Input and Submit Button -->
        <section id="contact" class="form-section">
            <h2>Stay Updated</h2>
            <form class="simple-form">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

</body>
</html>
